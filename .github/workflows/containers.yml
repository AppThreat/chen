name: Upload Container image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:    # allow to manually trigger this workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/chen-platform

jobs:
  deploy:
    if: github.repository_owner == 'appthreat'
    strategy:
      fail-fast: true
      matrix:
        image:
          - arch: amd64
          - arch: arm64
            runner-suffix: -arm
    runs-on: ubuntu-24.04${{ matrix.image.runner-suffix }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: sbt/setup-sbt@4ed7b7ec4bfa2074fe48554c09e341267397247c  # v1.2.0
      - name: "Install PHP"
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc  # 2.37.1
        with:
          coverage: "none"
          php-version: "8.4"
          tools: composer:v2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          package-manager-cache: false
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
        if: matrix.image.arch == 'amd64'
      - name: Trim CI agent
        run: |
          chmod +x ci/free_disk_space.sh
          ./ci/free_disk_space.sh
      - name: Delete `.rustup` directory
        run: rm -rf /home/runner/.rustup # to save disk space
        if: runner.os == 'Linux'
      - name: Delete `.cargo` directory # to save disk space
        run: rm -rf /home/runner/.cargo
        if: runner.os == 'Linux'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.sbt
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashfiles('**/build.sbt') }}
          lookup-only: true
      - run: |
          sbt stage createDistribution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCALAPY_PYTHON_LIBRARY: "python3.12"
      - name: Export python requirements
        if: matrix.image.arch == 'amd64'
        run: |
          python3.12 -m pip install --upgrade pip setuptools
          python3.12 -m pip install poetry
          python3.12 -m poetry self add poetry-plugin-export
          python3.12 -m poetry export -f requirements.txt --with=science --without-hashes --output target/chen-science-requirements.txt
          python3.12 -m poetry export -f requirements.txt --with=database --without-hashes --output target/chen-database-requirements.txt
      - name: Upload chen to ghcr
        if: matrix.image.arch == 'amd64'
        run: |
          cd target
          echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
          oras push ghcr.io/$IMAGE_NAME:v2 \
            --annotation-file ../ci/annotations.json \
            ./chen.zip:application/vnd.appthreat.chen.layer.v1+tar \
            ./chen-science-requirements.txt:application/vnd.appthreat.chen.layer.v1+tar \
            ./chen-database-requirements.txt:application/vnd.appthreat.chen.layer.v1+tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/appthreat/chen
          flavor: latest=false,suffix=-${{ matrix.image.arch }}
      - name: Build and push Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        id: build
        with:
          file: ci/Dockerfile
          context: .
          platforms: linux/${{ matrix.image.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=chen-${{ matrix.image.arch }}
          cache-to: type=gha,scope=chen-${{ matrix.image.arch }},mode=max

  deploy-manifest:
    if: github.repository_owner == 'appthreat'
    runs-on: ubuntu-24.04
    needs: [deploy]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        id: metadata
        with:
          images: ghcr.io/appthreat/chen
          flavor: latest=false
      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail

          annotation_args=()
          while IFS= read -r label; do
            [ -n "$label" ] || continue
            annotation_args+=(--annotation "index:${label}")
          done <<< "$LABELS"

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue

            echo "Creating multi-arch manifest: ${tag}"
            docker buildx imagetools create \
              "${annotation_args[@]}" \
              --tag "${tag}" \
              "${tag}-amd64" \
              "${tag}-arm64"

            docker buildx imagetools inspect "${tag}"
          done <<< "$TAGS"
        env:
          LABELS: ${{ steps.metadata.outputs.labels }}
          TAGS: ${{ steps.metadata.outputs.tags }}
